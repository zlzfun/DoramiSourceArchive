[server]
host = 127.0.0.1
port = 8088
reload = true

[runtime]
# Deployment role. Keep the default `all` for single-node setups.
# Only change for split deployments: collector (collect/archive only) / reader (distribution only).
role = all

[rag]
# Whether to enable RAG / vector retrieval. Off by default to keep startup
# fast and allow running on lightweight servers without loading the embedding
# model. Turn on (true) to use semantic search, RAG context, /api/vector/*,
# /api/vectorize/*, /api/rag/*, and MCP semantic search. Even when enabled the
# embedding model is loaded lazily on first use, so startup stays fast.
# Can also be overridden by env var DORAMI_RAG_ENABLED.
enabled = false

[network]
disable_ca_bundle = true
hf_endpoint = https://hf-mirror.com

[proxy]
http_proxy =
https_proxy =
no_proxy = 127.0.0.1,localhost

[auth]
cookie_name = dorami_admin_session
session_seconds = 604800
# Comma-separated login allowlists. Each item uses username:password.
# admin_users are superusers across collector/archive and reader/subscription surfaces.
# user_users can only access the reader/subscription surface.
admin_users = admin:change-me
user_users = user:change-me
secret = change-me-to-a-long-random-string
cookie_secure = false

[storage]
database_url = sqlite:///data/cms_data.db
chroma_path = data/chroma_db

[models]
embedding_model = BAAI/bge-m3
reranker_model = BAAI/bge-reranker-v2-m3

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[x_api]
# Prefer the environment variable DORAMI_X_BEARER_TOKEN. Never commit a real token.
bearer_token =
base_url = https://api.x.com/2
timeout_seconds = 30
max_results = 25
monthly_budget_usd = 5.0
