[runtime]
# Deployment role. Keep the default `all` for single-node setups.
# Only change for split deployments: collector (collect/archive only) / reader (distribution only).
role = all

[rag]
# Enable RAG / vector retrieval. Off by default so a lightweight reader/collector
# host starts fast without loading the embedding model. Set true on the host that
# serves semantic search / RAG context / MCP search. The embedding model is loaded
# lazily on first use even when enabled. Override via env DORAMI_RAG_ENABLED.
enabled = false
# 部署形态(v3.17 服务化):三 URL 全空 = 嵌入模式(进程内推理,镜像需
# WITH_RAG=1);配置 chroma_url + embedding_url = 远程模式(compose --profile rag
# 起 chroma server + TEI,后端保持瘦身镜像)。rerank_url 独立可选(精排增强)。
# 环境变量覆盖:DORAMI_RAG_CHROMA_URL / DORAMI_RAG_EMBEDDING_URL / DORAMI_RAG_RERANK_URL
# chroma_url = http://chroma:8000
# embedding_url = http://tei-embed:80
# rerank_url =

[media]
# 媒体库(图床):正文外链图片的本地缓存。抓取入库后自动预取,阅读器经
# /api/media/proxy 取图,失败 302 回源降级;归档正文原链从不改写。
# 关闭后整体退回外链直连。Override via env DORAMI_MEDIA_ENABLED.
enabled = true
# media_dir = data/media
# max_file_mb = 20
# timeout_seconds = 20
# prefetch_concurrency = 4

[network]
disable_ca_bundle = true
hf_endpoint = https://hf-mirror.com
# 内网出网被企业网关 MITM(自签证书链重签)时置 true:后端所有 httpx 出网
# 请求(采集/LLM/媒体预取/远程同步/X API)全局跳过 TLS 证书校验。
# 公网部署保持 false。环境变量 DORAMI_DISABLE_TLS_VERIFY 可覆盖。
disable_tls_verify = false

[proxy]
# If your company proxy requires credentials, put them only in production.ini.
# Example: http://user:password@proxy.company.com:8080
http_proxy =
https_proxy =
no_proxy = 127.0.0.1,localhost

[auth]
cookie_name = dorami_admin_session
session_seconds = 604800
# 账户全部数据库托管（users 表）：ini 不再配置账户名单。首启 users 表为空时
# 自动生成根管理员 admin/admin，请登录后立即修改密码，并按需新建管理员/读者账户。
# secret 必须改为长随机串（如 `python -c "import secrets;print(secrets.token_urlsafe(48))"`）。
# 启动安全校验在生产姿态（cookie_secure=true）下会拒绝未改的占位符/空值。
secret = change-me-to-a-long-random-string
# 生产走 HTTPS 时置 true：既让 Cookie 带 Secure，也开启启动期安全校验的「生产姿态」。
cookie_secure = false

[storage]
database_url = sqlite:///data/cms_data.db
chroma_path = data/chroma_db

[models]
embedding_model = /opt/dorami/models/bge-m3
reranker_model = /opt/dorami/models/bge-reranker-v2-m3

[cors]
# 生产安全：凭证型跨域（allow_credentials=true）下 allow_origins 必须是具体域名白名单，
# 不能用 *（cookie_secure=true 时启动校验会拒绝 *+credentials 组合）。
# 例：allow_origins = https://your-domain.example.com
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[x_api]
# Inject the secret with DORAMI_X_BEARER_TOKEN in production.
bearer_token =
base_url = https://api.x.com/2
timeout_seconds = 30
max_results = 25
monthly_budget_usd = 5.0
