[server]
host = 127.0.0.1
port = 8088
reload = false

[runtime]
# Use collector on the external-network archive host, reader on the intranet consumption host.
role = all

[network]
disable_ca_bundle = true
hf_endpoint = https://hf-mirror.com

[proxy]
# If your company proxy requires credentials, put them only in production.ini.
# Example: http://user:password@proxy.company.com:8080
http_proxy =
https_proxy =
no_proxy = 127.0.0.1,localhost

[auth]
cookie_name = dorami_admin_session
session_seconds = 604800
# Comma-separated login allowlists. Each item uses username:password.
# admin_users are superusers across collector/archive and reader/subscription surfaces.
# user_users can only access the reader/subscription surface.
admin_users = admin:change-me
user_users = user:change-me
secret = change-me-to-a-long-random-string
cookie_secure = false

[storage]
database_url = sqlite:///data/cms_data.db
chroma_path = data/chroma_db

[models]
embedding_model = /opt/dorami/models/bge-m3
reranker_model = /opt/dorami/models/bge-reranker-v2-m3

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[wechat]
auth_base_dir = .wechat_auth

[xiaoluban]
url = http://xiaoluban.rnd.huawei.com:80/
auth =
receiver =

[image_host]
upload_url_template = http://3ms.huawei.com/hi/restnew/editor/attach/upload?app_id=67&public_key=10067&current_timestamp={timestamp}&verify_code={verify_code}
secret_key =
timeout_seconds = 15
