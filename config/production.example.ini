[server]
host = 127.0.0.1
port = 8088
reload = false

[runtime]
# Deployment role. Keep the default `all` for single-node setups.
# Only change for split deployments: collector (collect/archive only) / reader (distribution only).
role = all

[rag]
# Enable RAG / vector retrieval. Off by default so a lightweight reader/collector
# host starts fast without loading the embedding model. Set true on the host that
# serves semantic search / RAG context / MCP search. The embedding model is loaded
# lazily on first use even when enabled. Override via env DORAMI_RAG_ENABLED.
enabled = false

[network]
disable_ca_bundle = true
hf_endpoint = https://hf-mirror.com

[proxy]
# If your company proxy requires credentials, put them only in production.ini.
# Example: http://user:password@proxy.company.com:8080
http_proxy =
https_proxy =
no_proxy = 127.0.0.1,localhost

[nginx]
# deploy.sh reads this section to generate the Nginx site config. Environment
# variables with matching uppercase names still override these values.
html_dir = /var/www/my_site
site_name = dorami
server_name = _
listen_port = 80
listen_options = default_server
disable_default_site = true
backend_proxy_host = 127.0.0.1
backend_proxy_port = 8088

# Set enable_ssl = true after DNS points your domain to this server and the
# certificate/key files are present. If cert/key are left empty, deploy.sh uses:
# /etc/nginx/ssl/{server_name}.pem and /etc/nginx/ssl/{server_name}.key
enable_ssl = false
ssl_listen_port = 443
ssl_redirect = true
ssl_cert_file =
ssl_key_file =
# Enable only after HTTPS certificate renewal/replacement is stable.
enable_hsts = false

[auth]
cookie_name = dorami_admin_session
session_seconds = 604800
# Comma-separated login allowlists. Each item uses username:password.
# admin_users are superusers across collector/archive and reader/subscription surfaces.
# user_users can only access the reader/subscription surface.
admin_users = admin:change-me
user_users = user:change-me
secret = change-me-to-a-long-random-string
cookie_secure = false

[storage]
database_url = sqlite:///data/cms_data.db
chroma_path = data/chroma_db

[models]
embedding_model = /opt/dorami/models/bge-m3
reranker_model = /opt/dorami/models/bge-reranker-v2-m3

[cors]
allow_origins = *
allow_credentials = true
allow_methods = *
allow_headers = *

[wechat]
auth_base_dir = .wechat_auth

[xiaoluban]
url = http://xiaoluban.rnd.huawei.com:80/
auth =
receiver =

[image_host]
upload_url_template = http://3ms.huawei.com/hi/restnew/editor/attach/upload?app_id=67&public_key=10067&current_timestamp={timestamp}&verify_code={verify_code}
secret_key =
timeout_seconds = 15
