# Dorami 生产部署 — 低版本 Docker 兼容版(内网 Docker 18.x + docker-compose v1)。
# 与 docker-compose.yml 同源:那边改了服务定义,这边须同步。差异仅两点:
#   1) 钉 version "2.4"(旧 docker-compose 不识别无 version 键的 compose-spec 文件;
#      2.4 需 docker-compose 1.21+ / Engine 17.12+,且 v2 格式原生支持
#      depends_on.condition 与 healthcheck.start_period);
#   2) 无 profiles(1.28+ 特性),RAG 服务组拆到 docker-compose.legacy-rag.yml,
#      需要时 -f 叠加(./deploy-docker-legacy.sh --rag)。
# 一键部署:./deploy-docker-legacy.sh;新版环境请用 ./deploy-docker.sh + docker-compose.yml。
version: "2.4"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      # 受限网络可换 PyPI 镜像,如:
      # args: { PIP_INDEX: "https://pypi.tuna.tsinghua.edu.cn/simple" }
    restart: unless-stopped
    environment:
      DORAMI_CONFIG_FILE: /app/config/production.ini
      # 机密只走环境变量注入(宿主 export 或 .env 文件),不进镜像不入库
      DORAMI_X_BEARER_TOKEN: ${DORAMI_X_BEARER_TOKEN:-}
      # cron 语义按此时区解释(与裸机部署的宿主时区行为对齐)
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
      - ./config/production.ini:/app/config/production.ini:ro
      # RAG 开启时挂载本地模型目录(路径须与 ini [models] 一致):
      # - /opt/dorami/models:/opt/dorami/models:ro
    # Chromium 渲染需要:Docker 默认 /dev/shm 只有 64MB,页面渲染会崩
    shm_size: "1gb"
    healthcheck:
      # /api/auth/session 是免鉴权端点(全局鉴权中间件的白名单);/api/runtime 未登录会 401
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8088/api/auth/session"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      # 受限网络可换 npm 镜像,如:
      # args: { NPM_REGISTRY: "https://registry.npmmirror.com" }
    restart: unless-stopped
    ports:
      # 默认 80(全接口);外层还有 TLS 反代时用绑定形式收进环回,
      # 如 DORAMI_HTTP_LISTEN=127.0.0.1:8080(生产:宿主 Nginx 443 终止 TLS 后反代到这里)
      - "${DORAMI_HTTP_LISTEN:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
