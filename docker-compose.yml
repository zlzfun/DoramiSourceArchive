# Dorami 生产部署(唯一部署路径;裸机 PM2 路径已于 v3.15.1 退役)。
# 用法见 docs/deploy-docker.md;一键部署:./deploy-docker.sh
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      # 受限网络可换 PyPI 镜像,如:
      # args: { PIP_INDEX: "https://pypi.tuna.tsinghua.edu.cn/simple" }
    restart: unless-stopped
    environment:
      DORAMI_CONFIG_FILE: /app/config/production.ini
      # 机密只走环境变量注入(宿主 export 或 .env 文件),不进镜像不入库
      DORAMI_X_BEARER_TOKEN: ${DORAMI_X_BEARER_TOKEN:-}
      # cron 语义按此时区解释(与裸机部署的宿主时区行为对齐)
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
      - ./config/production.ini:/app/config/production.ini:ro
      # RAG 开启时挂载本地模型目录(路径须与 ini [models] 一致):
      # - /opt/dorami/models:/opt/dorami/models:ro
    # Chromium 渲染需要:Docker 默认 /dev/shm 只有 64MB,页面渲染会崩
    shm_size: "1gb"
    healthcheck:
      # /api/auth/session 是免鉴权端点(全局鉴权中间件的白名单);/api/runtime 未登录会 401
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8088/api/auth/session"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── RAG 服务组(按需启用:docker compose --profile rag up -d)──────────────
  # 后端保持瘦身镜像,经 HTTP 使用这两个服务;ini 配置:
  #   [rag] enabled = true
  #   chroma_url = http://chroma:8000
  #   embedding_url = http://tei-embed:80
  # 首次启用后执行 POST /api/vector/reindex-all 从 SQLite 归档重建索引
  # (向量库是派生数据,不做旧嵌入式目录的搬运兼容)。
  chroma:
    image: chromadb/chroma:1.5.9   # 与后端 chromadb 客户端同版本(uv.lock);拉不到该 tag 时就近选同 minor
    profiles: ["rag"]
    restart: unless-stopped
    volumes:
      - ./data/chroma_server:/data
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    profiles: ["rag"]
    restart: unless-stopped
    command: --model-id BAAI/bge-m3
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - ./data/tei_cache:/data   # 模型权重缓存(首启下载 ~2.3GB,之后离线可用)
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # 重排(可选精排,再吃 ~2GB 内存;需要时取消注释并在 ini 配 rerank_url=http://tei-rerank:80)
  # tei-rerank:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
  #   profiles: ["rag"]
  #   restart: unless-stopped
  #   command: --model-id BAAI/bge-reranker-v2-m3
  #   environment:
  #     HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
  #   volumes:
  #     - ./data/tei_cache:/data

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      # 受限网络可换 npm 镜像,如:
      # args: { NPM_REGISTRY: "https://registry.npmmirror.com" }
    restart: unless-stopped
    ports:
      # 默认 80(全接口);外层还有 TLS 反代时用绑定形式收进环回,
      # 如 DORAMI_HTTP_LISTEN=127.0.0.1:8080(生产:宿主 Nginx 443 终止 TLS 后反代到这里)
      - "${DORAMI_HTTP_LISTEN:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
